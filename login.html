<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f7f7f9;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 14px;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(15, 23, 42, 0.08);
    }

    .login-card h2 {
      margin: 0 0 0.75rem;
      font-size: 1.5rem;
      color: #111827;
      letter-spacing: -0.02em;
    }

    .login-card p {
      margin: 0 0 1.75rem;
      color: #6b7280;
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
      color: #374151;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 1rem;
      color: #111827;
      background: #f8fafc;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
      background: #ffffff;
    }

    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-top: 0.5rem;
    }

    .checkbox-label {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      color: #4b5563;
    }

    .checkbox-label input {
      width: 1rem;
      height: 1rem;
      accent-color: #2563eb;
    }

    .btn {
      background: #2563eb;
      color: #ffffff;
      padding: 0.85rem 1.1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.01em;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      width: 100%;
    }

    .btn:hover {
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.18);
      transform: translateY(-1px);
    }

    .footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.95rem;
      color: #6b7280;
    }

    .footer a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }

    @media (max-width: 420px) {
      body {
        padding: 1rem;
      }

      .login-card {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <main class="login-card" role="main" aria-labelledby="login-title">
    <h2 id="login-title">Sign in to your account</h2>
    <p>Enter your email and password to access your dashboard. Secure sign-in with a clean, readable layout.</p>
    <form action="web.html" method="get" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required autocomplete="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required autocomplete="current-password" placeholder="Enter your password">
      </div>
      <div class="form-row">
        <label class="checkbox-label">
          <input type="checkbox" name="remember">
          Remember me
        </label>
      </div>
      <button type="submit" class="btn">Sign in</button>
    </form>
    <div class="footer">Don&#39;t have an account? <a href="web.html">Sign up</a></div>
  </main>
</body>
</html>
