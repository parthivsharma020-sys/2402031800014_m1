<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Indian Delivery App - Fast and Reliable Service">
    <meta name="theme-color" content="#ffffff">
    <title>fnp.com</title>
    <link rel="stylesheet" href="web.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search" />
</head>
<body>
    <header class="header" role="banner">
        <div class="header__banner">
            <div class="header__banner-text">header_nav</div>
        </div>
        <div class="header__content">
            <div class="header__logo">
                <img src="https://www.fnp.com/icons/fnp-gift-new.svg" alt="FNP Gift Logo" class="header__logo-image">
                <h1 class="header__title">Indian Delivery app</h1>
            </div>

            <div class="header__search" role="search">
                <label for="search-input" class="header__search-label">
                    <span class="material-symbols-outlined" aria-hidden="true">search</span>
                </label>
                <input type="text" id="search-input" class="header__search-input" placeholder="search something.." data-component="search-field">
            </div>

            <nav class="header__nav" role="navigation">
                <a href="#" class="header__nav-link" data-category="same-day">same day</a>
                <a href="#" class="header__nav-link" data-category="currency">INR</a>
                <a href="#" class="header__nav-link" data-category="corporate">corporate</a>
                <a href="#" class="header__nav-link" data-category="cart">cart</a>
            </nav>
        </div>
    </header>
    <div class="slider">
        <div class="slide"><img src="https://static-assets-prod.fnp.com/assets/images/custom/desk-home-banners/fifty-shades-of-summer-desk.jpg" alt="Slide 1"></div>
        <div class="slide"><img src="https://static-assets-prod.fnp.com/assets/images/custom/new-icons-2026/summer-theme/Anniversary-desk.png" alt="Slide 2"></div>
        <div class="slide"><img src="https://static-assets-prod.fnp.com/assets/images/custom/new-icons-2026/summer-theme/WeddingGifts_Desk.png" alt="Slide 3"></div>
        <div class="slide"><img src="https://static-assets-prod.fnp.com/assets/images/custom/new-icons-2026/summer-theme/LUXE-desk.png" alt="Slide 4"></div>

    </div>

    <main class="main-content" role="main">
        <div class="image-container" data-component="image-gallery">
            <div class="single-img">                
                <div><img src="https://static-assets-prod.fnp.com/assets/images/custom/new-icons-2026/summer-theme/Same-day-delivery-desk.png" alt="Image 1" class="gallery-image"></div>
                <div class="btn-set"><button class="btn btn-light">Add Cart</button> <button class="btn btn-primary">Buy Now</button></div>
            </div>
            <div class="single-img">                
                <div><img src="https://static-assets-prod.fnp.com/assets/images/custom/new-icons-2026/summer-theme/Anniversary-desk.png" alt="Image 3" class="gallery-image"></div>
                <div class="btn-set"><button class="btn btn-light">Add Cart</button> <button class="btn btn-primary">Buy Now</button></div>
            </div>
             <div class="single-img">                
                <div><img src="https://static-assets-prod.fnp.com/assets/images/custom/new-icons-2026/summer-theme/Anniversary-desk.png" alt="Image 3" class="gallery-image"></div>
                <div class="btn-set"><button class="btn btn-light">Add Cart</button> <button class="btn btn-primary">Buy Now</button></div>
            </div>
             <div class="single-img">                
                <div><img src="https://static-assets-prod.fnp.com/assets/images/custom/new-icons-2026/summer-theme/WeddingGifts_Desk.png" alt="Image 4" class="gallery-image"></div>
                <div class="btn-set"><button class="btn btn-light">Add Cart</button> <button class="btn btn-primary">Buy Now</button></div>
            </div>
            <div class="single-img">                
                <div><img src="https://static-assets-prod.fnp.com/assets/images/custom/new-icons-2026/summer-theme/LUXE-desk.png" alt="Image 5" class="gallery-image">
                <div class="btn-set"><button class="btn btn-light">Add Cart</button> <button class="btn btn-primary">Buy Now</button></div>
            </div>          

                        </div>
    </main>

    <!-- <script src="web.js" defer></script> -->
</body>
</html>
